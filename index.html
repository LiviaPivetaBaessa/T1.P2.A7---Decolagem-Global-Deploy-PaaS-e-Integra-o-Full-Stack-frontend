<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Assistente IA</title>

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 420px;
            height: 650px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header {
            padding: 18px;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            color: #fff;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .historico {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Scroll moderno */
        .historico::-webkit-scrollbar {
            width: 6px;
        }

        .historico::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .mensagem {
            padding: 12px 14px;
            border-radius: 14px;
            max-width: 75%;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.2s ease-in-out;
        }

        .user {
            align-self: flex-end;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            color: #e5e7eb;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            display: flex;
            padding: 12px;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        button {
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(34,197,94,0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="header">🤖 Assistente IA</div>

    <div class="historico" id="historico"></div>

    <div class="input-area">
        <input type="text" id="pergunta" placeholder="Digite sua mensagem...">
        <button onclick="enviarMensagem()">Enviar</button>
    </div>
</div>

<script>
    // COLE A URL DO SEU RENDER AQUI (mantenha o /api/chat no final)
    const URL_BACKEND = "https://t1-p2-a7-decolagem-global-deploy-paas-e.onrender.com/api/chat";

    async function enviarMensagem() {
        const input = document.getElementById("pergunta");
        const historico = document.getElementById("historico");
        const texto = input.value;

        if(!texto) return;

        // 1. Mostra a mensagem do usuário na tela
        historico.innerHTML += `<div class="mensagem user">${texto}</div>`;
        input.value = "";
        historico.innerHTML += `<div class="mensagem bot" id="loading">Pensando...</div>`;

        try {
            // 2. Faz o Fetch (POST) para a SUA API na Nuvem
            const resposta = await fetch(URL_BACKEND, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ pergunta: texto })
            });

            const dados = await resposta.json();

            // 3. Remove o "Pensando..." e mostra a resposta real
            document.getElementById("loading").remove();
            historico.innerHTML += `<div class="mensagem bot">${dados.resposta}</div>`;
            
            // Rola o chat para baixo
            historico.scrollTop = historico.scrollHeight;

        } catch (erro) {
            document.getElementById("loading").innerHTML = "Erro de conexão com o Servidor ❌";
        }
    }
</script>

</body>
</html>
